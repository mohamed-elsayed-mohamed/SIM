# Clone/bootstrap vcpkg, cache manifest installs, integrate, overlay triplet.
name: Set up vcpkg
description: Bootstraps vcpkg, caches ProjectA/ProjectB installs, runs integrate and overlay triplet generation.

runs:
  using: composite
  steps:
    - name: Bootstrap vcpkg
      shell: bash
      run: |
        set -euo pipefail
        VCPKG_ROOT="C:/vcpkg"
        if [ -d "$VCPKG_ROOT/.git" ]; then
          echo "vcpkg already cloned at $VCPKG_ROOT"
        elif [ -e "$VCPKG_ROOT" ]; then
          echo "Removing existing non-repo path at $VCPKG_ROOT"
          rm -rf "$VCPKG_ROOT"
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
        else
          git clone https://github.com/microsoft/vcpkg.git "$VCPKG_ROOT"
        fi
        # Manifest builtin-baseline uses `git show <sha>:versions/baseline.json` — need full objects.
        if git -C "$VCPKG_ROOT" rev-parse --is-shallow-repository 2>/dev/null | grep -q true; then
          echo "Unshallowing vcpkg clone for builtin-baseline resolution..."
          git -C "$VCPKG_ROOT" fetch --unshallow
        fi
        git -C "$VCPKG_ROOT" fetch origin master
        if [ -f "ProjectA/vcpkg.json" ]; then
          BASELINE=$(grep '"builtin-baseline"' ProjectA/vcpkg.json | head -1 | sed 's/.*"\([a-f0-9]\{40\}\)".*/\1/')
          if [ -n "$BASELINE" ]; then
            if ! git -C "$VCPKG_ROOT" rev-parse --verify "$BASELINE^{commit}" >/dev/null 2>&1; then
              echo "Fetching manifest baseline commit $BASELINE..."
              git -C "$VCPKG_ROOT" fetch origin "$BASELINE"
            fi
            if ! git -C "$VCPKG_ROOT" show "$BASELINE:versions/baseline.json" >/dev/null 2>&1; then
              echo "Baseline $BASELINE missing versions/baseline.json in this clone; fetching full history..."
              git -C "$VCPKG_ROOT" fetch --unshallow || true
              git -C "$VCPKG_ROOT" fetch origin master
            fi
          fi
        fi
        "$VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics
        echo "VCPKG_ROOT=$VCPKG_ROOT" >> "$GITHUB_ENV"
        echo "$VCPKG_ROOT" >> "$GITHUB_PATH"

    - name: Cache vcpkg installed packages
      uses: actions/cache@v4
      with:
        path: |
          ProjectA/vcpkg_installed
          ProjectB/vcpkg_installed
        key: vcpkg-${{ runner.os }}-${{ hashFiles('ProjectA/vcpkg.json', 'ProjectB/vcpkg.json') }}
        restore-keys: |
          vcpkg-${{ runner.os }}-

    - name: vcpkg integrate install
      shell: bash
      run: vcpkg integrate install

    - name: Generate vcpkg overlay triplet
      shell: pwsh
      run: python Build/Python/build.py --write-overlay-triplet
