# Upload artifacts/<VERSION>/ as a CI downloadable archive.
name: Upload build artifact
description: Uploads the flattened artifact folder to GitHub Actions artifact storage.

runs:
  using: composite
  steps:
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-${{ env.VERSION }}
        path: artifacts/${{ env.VERSION }}/
        if-no-files-found: warn
        retention-days: 30
