# Flatten DLLs + .nupkg into artifacts/<VERSION>/ and write manifest.json.
name: Collect build artifacts
description: Copies binaries and packages into a versioned folder with manifest.json.

runs:
  using: composite
  steps:
    - name: "[publish] Collect artifacts and write manifest"
      shell: pwsh
      run: |
        $version  = "${{ env.VERSION }}"
        $config   = "${{ env.BUILD_CONFIG }}"
        $platform = "${{ env.BUILD_PLATFORM }}"
        $outDir   = "artifacts\$version"
        New-Item -ItemType Directory -Force -Path $outDir | Out-Null

        $artifacts = @(
          @{ Src = "ProjectA\$platform\$config\ProjectA.dll";             Name = "ProjectA.dll" },
          @{ Src = "ProjectB\$platform\$config\ProjectB.dll";             Name = "ProjectB.dll" },
          @{ Src = "ProjectC\bin\$config\net8.0\ProjectC.dll";            Name = "ProjectC.dll" },
          @{ Src = "ProjectD\bin\$config\net8.0\ProjectD.dll";            Name = "ProjectD_net8.dll" },
          @{ Src = "ProjectD\bin\$config\netstandard2.1\ProjectD.dll";    Name = "ProjectD_netstandard2.1.dll" }
        )

        $published = @()
        $missing   = @()
        foreach ($a in $artifacts) {
          if (Test-Path $a.Src) {
            Copy-Item $a.Src "$outDir\$($a.Name)" -Force
            Write-Host "[publish] Copied $($a.Name)"
            $published += $a.Name
          } else {
            Write-Warning "[publish] Not found (skipping): $($a.Src)"
            $missing += $a.Src
          }
        }

        foreach ($proj in @("ProjectC", "ProjectD")) {
          Get-ChildItem "$proj\bin\$config\*.nupkg" -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName $outDir -Force
            Write-Host "[publish] Copied $($_.Name)"
            $published += $_.Name
          }
        }

        # ProjectE — Unity plugin staging (always produced in CI: DLLs under Assets/Plugins)
        $pluginsSrc = "ProjectE\Assets\Plugins"
        $pluginsDst = Join-Path $outDir "ProjectE-Assets-Plugins"
        if (Test-Path $pluginsSrc) {
          New-Item -ItemType Directory -Force -Path $pluginsDst | Out-Null
          Copy-Item "$pluginsSrc\*" $pluginsDst -Recurse -Force
          Get-ChildItem $pluginsDst -Recurse -File | ForEach-Object {
            $rel = $_.FullName.Substring($pluginsDst.Length).TrimStart('\')
            $name = "ProjectE-Assets-Plugins\$rel"
            Write-Host "[publish] Copied $name"
            $published += $name
          }
        } else {
          Write-Warning "[publish] Not found (skipping): $pluginsSrc"
          $missing += $pluginsSrc
        }

        # ProjectE — optional Unity player build (local / self-hosted with Unity; skipped on windows-latest)
        $unityRoot = "ProjectE\Builds\StandaloneWindows64"
        $unityExe = Join-Path $unityRoot "ProjectE.exe"
        if (Test-Path $unityExe) {
          $unityDst = Join-Path $outDir "ProjectE-StandaloneWindows64"
          Copy-Item $unityRoot $unityDst -Recurse -Force
          Write-Host "[publish] Copied ProjectE-StandaloneWindows64\"
          $published += "ProjectE-StandaloneWindows64/"
        }

        $manifest = [ordered]@{
          version   = $version
          config    = $config
          platform  = $platform
          artifacts = $published
        }
        $manifest | ConvertTo-Json -Depth 3 | Set-Content "$outDir\manifest.json" -Encoding UTF8
        Write-Host "[publish] Wrote manifest.json"

        if ($missing.Count -gt 0) {
          Write-Warning "[publish] $($missing.Count) artifact(s) were missing."
        } else {
          Write-Host "[publish] All artifacts published to $outDir"
        }
